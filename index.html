<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros - NES Classic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,150,255,0.3);
        }
        #hud {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <span id="scoreDisplay">SCORE: 0</span> | 
        <span id="coinsDisplay">🪙 x0</span> | 
        <span id="livesDisplay">❤️ x3</span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Tamanho da tela (NES: 256x240)
        const W = 800;
        const H = 480;
        canvas.width = W;
        canvas.height = H;

        // ========== CONFIGURAÇÕES ==========
        const GRAVITY = 0.6;
        const GROUND_Y = 400; // nível do chão
        const TILE_SIZE = 40;

        // ========== ESTADO DO JOGO ==========
        let cameraX = 0;
        let score = 0;
        let coins = 0;
        let lives = 3;
        let gameOver = false;

        // Jogador
        const player = {
            x: 100, y: GROUND_Y - 60,
            vx: 0, vy: 0,
            width: 32, height: 40,
            onGround: false,
            facingRight: true,
            big: false,
            invincible: 0,
            frame: 0,
            state: 'idle' // idle, running, jumping
        };

        // ========== CENÁRIO ==========
        // 0=vazio, 1=chão, 2=tijolo, 3=bloco?, 4=tubo, 5=bloco usado
        const level = [];
        const LEVEL_WIDTH = 100; // tiles de largura

        // Inimigos
        const enemies = [];
        const ENEMY_TYPES = { GOOMBA: 'goomba', KOOPA: 'koopa' };

        // Power-ups
        const powerUps = [];

        // Partículas (moedas, efeitos)
        const particles = [];

        // ========== CONSTRUÇÃO DO NÍVEL ==========
        function buildLevel() {
            for (let r = 0; r < 12; r++) {
                level[r] = [];
                for (let c = 0; c < LEVEL_WIDTH; c++) {
                    level[r][c] = 0;
                }
            }

            // Chão (linhas 10 e 11)
            for (let c = 0; c < LEVEL_WIDTH; c++) {
                level[10][c] = 1;
                level[11][c] = 1;
            }

            // Buracos
            const holes = [18, 19, 38, 39, 40, 58, 59, 78, 79];
            holes.forEach(c => {
                if (c < LEVEL_WIDTH) {
                    level[10][c] = 0;
                    level[11][c] = 0;
                }
            });

            // Blocos de interrogação (moedas e cogumelo)
            const questionBlocks = [
                {c:10, r:6}, {c:14, r:6}, {c:18, r:3},
                {c:22, r:6}, {c:26, r:6}, {c:30, r:3},
                {c:34, r:6}, {c:38, r:6}, {c:42, r:3},
                {c:46, r:6}, {c:50, r:6}, {c:54, r:3},
                {c:60, r:6}, {c:64, r:6}, {c:68, r:3},
                {c:72, r:6}, {c:76, r:6}, {c:80, r:3}
            ];
            questionBlocks.forEach(b => { level[b.r][b.c] = 3; });

            // Blocos de tijolo normais
            for (let c = 12; c < 16; c++) level[6][c] = 2;
            for (let c = 20; c < 24; c++) level[6][c] = 2;
            for (let c = 32; c < 36; c++) level[6][c] = 2;
            for (let c = 44; c < 48; c++) level[6][c] = 2;
            for (let c = 62; c < 66; c++) level[6][c] = 2;
            for (let c = 74; c < 78; c++) level[6][c] = 2;

            // Tubos
            const pipes = [
                {c: 8, h: 2}, {c: 16, h: 2}, {c: 28, h: 3},
                {c: 36, h: 2}, {c: 52, h: 3}, {c: 70, h: 2}
            ];
            pipes.forEach(p => {
                for (let i = 0; i < p.h; i++) {
                    level[9 - i][p.c] = 4;
                    level[9 - i][p.c + 1] = 4;
                }
            });

            // Escada no final (degraus para bandeira)
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j <= i; j++) {
                    level[9 - i][88 + j] = 1;
                }
            }
        }

        // ========== INIMIGOS ==========
        function spawnEnemies() {
            const enemyPositions = [
                {x: 300, type: ENEMY_TYPES.GOOMBA},
                {x: 500, type: ENEMY_TYPES.GOOMBA},
                {x: 700, type: ENEMY_TYPES.KOOPA},
                {x: 900, type: ENEMY_TYPES.GOOMBA},
                {x: 1100, type: ENEMY_TYPES.KOOPA},
                {x: 1300, type: ENEMY_TYPES.GOOMBA},
                {x: 1500, type: ENEMY_TYPES.GOOMBA},
                {x: 1700, type: ENEMY_TYPES.KOOPA},
                {x: 1900, type: ENEMY_TYPES.GOOMBA},
                {x: 2100, type: ENEMY_TYPES.GOOMBA},
                {x: 2300, type: ENEMY_TYPES.KOOPA},
                {x: 2500, type: ENEMY_TYPES.GOOMBA},
            ];

            enemyPositions.forEach(pos => {
                enemies.push({
                    x: pos.x,
                    y: GROUND_Y - 35,
                    vx: (Math.random() > 0.5 ? 1 : -1) * 1.5,
                    vy: 0,
                    width: 32,
                    height: 32,
                    type: pos.type,
                    alive: true,
                    squashed: false,
                    squashedTimer: 0
                });
            });
        }

        // ========== COLISÕES ==========
        function getTileAt(x, y) {
            const col = Math.floor(x / TILE_SIZE);
            const row = Math.floor(y / TILE_SIZE);
            if (row < 0 || row >= 12 || col < 0 || col >= LEVEL_WIDTH) return 0;
            return level[row][col];
        }

        function isSolid(tile) {
            return tile === 1 || tile === 2 || tile === 4;
        }

        function resolveCollision(entity) {
            // Colisão com tiles sólidos
            const left = entity.x;
            const right = entity.x + entity.width;
            const top = entity.y;
            const bottom = entity.y + entity.height;

            // Verifica colisões em todos os tiles próximos
            const startCol = Math.floor(left / TILE_SIZE) - 1;
            const endCol = Math.floor(right / TILE_SIZE) + 1;
            const startRow = Math.floor(top / TILE_SIZE) - 1;
            const endRow = Math.floor(bottom / TILE_SIZE) + 1;

            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    if (r < 0 || r >= 12 || c < 0 || c >= LEVEL_WIDTH) continue;
                    const tile = level[r][c];
                    if (!isSolid(tile)) continue;

                    const tileX = c * TILE_SIZE;
                    const tileY = r * TILE_SIZE;

                    // Colisão
                    if (right > tileX && left < tileX + TILE_SIZE &&
                        bottom > tileY && top < tileY + TILE_SIZE) {
                        
                        const overlapLeft = right - tileX;
                        const overlapRight = (tileX + TILE_SIZE) - left;
                        const overlapTop = bottom - tileY;
                        const overlapBottom = (tileY + TILE_SIZE) - top;

                        const minOverlapX = Math.min(overlapLeft, overlapRight);
                        const minOverlapY = Math.min(overlapTop, overlapBottom);

                        if (minOverlapX < minOverlapY) {
                            if (overlapLeft < overlapRight) {
                                entity.x = tileX - entity.width;
                            } else {
                                entity.x = tileX + TILE_SIZE;
                            }
                            entity.vx = 0;
                        } else {
                            if (overlapTop < overlapBottom) {
                                entity.y = tileY - entity.height;
                                entity.vy = 0;
                                entity.onGround = true;
                            } else {
                                entity.y = tileY + TILE_SIZE;
                                entity.vy = 0;
                                // Bateu com a cabeça no bloco
                                if (entity === player && tile === 3) {
                                    hitQuestionBlock(c, r);
                                }
                            }
                        }
                    }
                }
            }
        }

        function hitQuestionBlock(c, r) {
            if (level[r][c] === 3) {
                level[r][c] = 5; // bloco usado
                // 50% chance de moeda, 50% de cogumelo (se Mario pequeno)
                if (!player.big && Math.random() < 0.5) {
                    powerUps.push({
                        x: c * TILE_SIZE + TILE_SIZE/2,
                        y: r * TILE_SIZE - TILE_SIZE,
                        vy: -8,
                        type: 'mushroom',
                        width: 30,
                        height: 30
                    });
                } else {
                    coins++;
                    score += 200;
                    spawnCoinParticle(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE);
                }
            }
        }

        function spawnCoinParticle(x, y) {
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -4 - Math.random() * 4,
                    life: 30,
                    color: '#ffd700'
                });
            }
        }

        // ========== UPDATE ==========
        function update() {
            if (gameOver) return;

            // Atualiza jogador
            player.vy += GRAVITY;
            player.x += player.vx;
            player.y += player.vy;
            player.onGround = false;

            if (player.invincible > 0) player.invincible--;

            resolveCollision(player);

            // Limites
            if (player.x < 0) player.x = 0;
            if (player.y > H + 100) {
                die();
                return;
            }

            // Atualiza inimigos
            enemies.forEach(enemy => {
                if (!enemy.alive) return;
                if (enemy.squashed) {
                    enemy.squashedTimer--;
                    if (enemy.squashedTimer <= 0) enemy.alive = false;
                    return;
                }

                enemy.vy += GRAVITY;
                enemy.x += enemy.vx;
                enemy.y += enemy.vy;
                enemy.onGround = false;
                resolveCollision(enemy);

                // Inimigo caiu no buraco
                if (enemy.y > H) enemy.alive = false;

                // Colisão com jogador
                if (player.invincible <= 0) {
                    const dx = player.x + player.width/2 - (enemy.x + enemy.width/2);
                    const dy = player.y + player.height/2 - (enemy.y + enemy.height/2);
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < 40 && !enemy.squashed) {
                        // Verifica se Mario está caindo sobre o inimigo
                        if (player.vy > 0 && player.y + player.height < enemy.y + enemy.height/2) {
                            // Pisa no inimigo
                            enemy.squashed = true;
                            enemy.squashedTimer = 20;
                            player.vy = -6;
                            score += 100;
                        } else {
                            // Mario é atingido
                            if (player.big) {
                                player.big = false;
                                player.height = 40;
                                player.y += 20;
                                player.invincible = 120;
                            } else {
                                die();
                            }
                        }
                    }
                }
            });

            // Atualiza power-ups
            powerUps.forEach(pu => {
                pu.vy += GRAVITY;
                pu.y += pu.vy;
                pu.x += (pu.vx || 2);
                resolveCollision(pu);

                // Colisão com Mario
                if (Math.abs(player.x - pu.x) < 35 && Math.abs(player.y - pu.y) < 40) {
                    if (pu.type === 'mushroom') {
                        player.big = true;
                        player.height = 60;
                        player.y -= 20;
                        score += 1000;
                    }
                    pu.collected = true;
                }
            });

            // Remove coletados
            powerUps = powerUps.filter(pu => !pu.collected && pu.y < H + 200);
            enemies = enemies.filter(e => e.alive || e.squashedTimer > 0);
            particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });

            // Câmera segue Mario
            cameraX = player.x - W/3;
            if (cameraX < 0) cameraX = 0;

            // Vitória (chegou na bandeira)
            if (player.x > 88 * TILE_SIZE) {
                score += 5000;
                gameOver = true;
                setTimeout(resetGame, 3000);
            }

            updateHUD();
        }

        function die() {
            lives--;
            if (lives <= 0) {
                gameOver = true;
                setTimeout(resetGame, 2000);
            } else {
                player.x = 100;
                player.y = GROUND_Y - 60;
                player.vx = 0;
                player.vy = 0;
                player.big = false;
                player.height = 40;
                player.invincible = 60;
                cameraX = 0;
            }
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = `SCORE: ${score}`;
            document.getElementById('coinsDisplay').textContent = `🪙 x${coins}`;
            document.getElementById('livesDisplay').textContent = `❤️ x${lives}`;
        }

        function resetGame() {
            score = 0;
            coins = 0;
            lives = 3;
            gameOver = false;
            player.x = 100;
            player.y = GROUND_Y - 60;
            player.vx = 0;
            player.vy = 0;
            player.big = false;
            player.height = 40;
            player.invincible = 60;
            player.facingRight = true;
            cameraX = 0;
            enemies.length = 0;
            powerUps.length = 0;
            particles.length = 0;
            buildLevel();
            spawnEnemies();
            updateHUD();
        }

        // ========== CONTROLES ==========
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code.startsWith('Arrow') || e.code === 'Space') e.preventDefault();
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        function handleInput() {
            if (gameOver) return;

            // Movimento
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx = -4;
                player.facingRight = false;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx = 4;
                player.facingRight = true;
            } else {
                player.vx *= 0.8;
            }

            // Pulo
            if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.onGround) {
                player.vy = -10;
                player.onGround = false;
            }
        }

        // ========== RENDERIZAÇÃO ==========
        function draw() {
            // Céu
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
            skyGrad.addColorStop(0, '#5c94fc');
            skyGrad.addColorStop(1, '#87CEEB');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // Nuvens decorativas
            ctx.fillStyle = 'white';
            for (let i = 0; i < 6; i++) {
                const cloudX = (i * 300 + 50 - cameraX * 0.3) % (W + 400) - 200;
                ctx.beginPath();
                ctx.arc(cloudX, 60, 25, 0, Math.PI*2);
                ctx.arc(cloudX + 30, 45, 30, 0, Math.PI*2);
                ctx.arc(cloudX + 60, 60, 25, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.save();
            ctx.translate(-cameraX, 0);

            // Desenha tiles
            for (let r = 0; r < 12; r++) {
                for (let c = 0; c < LEVEL_WIDTH; c++) {
                    const x = c * TILE_SIZE;
                    const y = r * TILE_SIZE;
                    const tile = level[r][c];

                    if (tile === 1) { // Chão
                        ctx.fillStyle = '#c84c09';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#e09050';
                        ctx.fillRect(x, y, TILE_SIZE, 5);
                        ctx.strokeStyle = '#8b4513';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                    } else if (tile === 2) { // Tijolo
                        ctx.fillStyle = '#c84c09';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.strokeRect(x+2, y+2, TILE_SIZE-4, TILE_SIZE-4);
                    } else if (tile === 3) { // Bloco ?
                        ctx.fillStyle = '#f0b028';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#8b6914';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 20px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('?', x + TILE_SIZE/2, y + TILE_SIZE/2 + 7);
                    } else if (tile === 4) { // Tubo
                        ctx.fillStyle = '#00a800';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#00d800';
                        ctx.fillRect(x + 5, y, TILE_SIZE - 10, TILE_SIZE);
                        ctx.strokeStyle = '#005800';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                    } else if (tile === 5) { // Bloco usado
                        ctx.fillStyle = '#886848';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#5a4030';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                    }
                }
            }

            // Power-ups
            powerUps.forEach(pu => {
                if (pu.type === 'mushroom') {
                    ctx.fillStyle = '#e74c3c';
                    ctx.beginPath();
                    ctx.arc(pu.x, pu.y, 15, Math.PI, 0);
                    ctx.fillRect(pu.x - 15, pu.y, 30, 15);
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(pu.x - 7, pu.y - 5, 6, 0, Math.PI*2);
                    ctx.arc(pu.x + 7, pu.y - 5, 6, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            // Inimigos
            enemies.forEach(enemy => {
                if (!enemy.alive && !enemy.squashed) return;
                
                if (enemy.squashed) {
                    ctx.fillStyle = enemy.type === ENEMY_TYPES.GOOMBA ? '#c84c09' : '#00a800';
                    ctx.fillRect(enemy.x, enemy.y + 20, enemy.width, 10);
                    return;
                }

                if (enemy.type === ENEMY_TYPES.GOOMBA) {
                    ctx.fillStyle = '#c84c09';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 16, enemy.y + 16, 15, Math.PI, 0);
                    ctx.fillRect(enemy.x + 1, enemy.y + 16, 30, 15);
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 10, enemy.y + 12, 3, 0, Math.PI*2);
                    ctx.arc(enemy.x + 22, enemy.y + 12, 3, 0, Math.PI*2);
                    ctx.fill();
                } else if (enemy.type === ENEMY_TYPES.KOOPA) {
                    ctx.fillStyle = '#00a800';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 16, enemy.y + 16, 12, Math.PI, 0);
                    ctx.fillRect(enemy.x + 4, enemy.y + 16, 24, 14);
                    ctx.fillStyle = '#f0b028';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 16, enemy.y + 16, 10, Math.PI, 0);
                    ctx.fillRect(enemy.x + 6, enemy.y + 16, 20, 10);
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(enemy.x + 10, enemy.y + 12, 2.5, 0, Math.PI*2);
                    ctx.arc(enemy.x + 22, enemy.y + 12, 2.5, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            // Mario
            if (player.invincible <= 0 || Math.floor(Date.now()/100)%2 === 0) {
                const mx = player.x;
                const my = player.y;
                const h = player.height;

                // Corpo
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(mx + 4, my + 10, 24, h - 20);
                
                // Macacão
                ctx.fillStyle = '#2980b9';
                ctx.fillRect(mx + 4, my + h/2, 24, h/2 - 5);
                
                // Cabeça
                ctx.fillStyle = '#ffeaa7';
                ctx.beginPath();
                ctx.arc(mx + 16, my + 8, 12, 0, Math.PI*2);
                ctx.fill();
                
                // Boné
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(mx + 16, my + 4, 12, Math.PI, 0);
                ctx.fill();
                
                // Olho
                ctx.fillStyle = '#000';
                const eyeX = player.facingRight ? mx + 20 : mx + 12;
                ctx.beginPath();
                ctx.arc(eyeX, my + 5, 3, 0, Math.PI*2);
                ctx.fill();
            }

            // Partículas
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fill();
            });

            // Bandeira
            const flagX = 90 * TILE_SIZE;
            const flagY = 3 * TILE_SIZE;
            ctx.fillStyle = '#888';
            ctx.fillRect(flagX + 10, flagY, 8, GROUND_Y - flagY);
            ctx.fillStyle = '#00a800';
            ctx.beginPath();
            ctx.moveTo(flagX + 18, flagY);
            ctx.lineTo(flagX + 58, flagY + 30);
            ctx.lineTo(flagX + 18, flagY + 60);
            ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(flagX + 10, flagY - 5, 10, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();
        }

        // ========== GAME LOOP ==========
        function gameLoop() {
            handleInput();
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Inicialização
        buildLevel();
        spawnEnemies();
        updateHUD();
        gameLoop();
    </script>
</body>
</html>
